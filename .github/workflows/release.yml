name: Release

on:
  push:
    tags:
      - 'SUGv*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 X.Y.Z（用于手动触发）'
        required: true

env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: '1'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ inputs.version }}"
          } else {
            $tag = "${{ github.ref_name }}"
            $v = $tag -replace '^SUGv', ''
          }
          if ($v -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Invalid version: $v"
            exit 1
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "tag=SUGv$v"  >> $env:GITHUB_OUTPUT
          Write-Host "version=$v tag=SUGv$v"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync version
        shell: pwsh
        run: |
          $OutputEncoding = [System.Text.UTF8Encoding]::new()
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new()
          $v = "${{ steps.ver.outputs.version }}"
          $f = "src/strange_uta_game/__version__.py"
          (Get-Content -LiteralPath $f -Raw) `
            -replace '__version__\s*=\s*"[^"]+"', "__version__ = `"$v`"" `
            | Set-Content -LiteralPath $f -Encoding UTF8
          Get-Content $f | Select-String '__version__'

      - name: Build (Updater + main app + pack parts + manifest + self-check)
        shell: pwsh
        run: |
          $OutputEncoding = [System.Text.UTF8Encoding]::new()
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new()
          python scripts/release.py build

      - name: Extract release notes
        shell: pwsh
        run: |
          $OutputEncoding = [System.Text.UTF8Encoding]::new()
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new()
          $v = "${{ steps.ver.outputs.version }}"
          python scripts/release.py extract-notes $v -o "dist/release_notes-v$v.md"
          Get-Content "dist/release_notes-v$v.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: StrangeUtaGame_v${{ steps.ver.outputs.version }}
          body_path: dist/release_notes-v${{ steps.ver.outputs.version }}.md
          files: |
            dist/StrangeUtaGame-v${{ steps.ver.outputs.version }}.zip
            dist/StrangeUtaGame-v${{ steps.ver.outputs.version }}.zip.sha256
            dist/StrangeUtaGame-v${{ steps.ver.outputs.version }}-app.zip
            dist/StrangeUtaGame-v${{ steps.ver.outputs.version }}-app.zip.sha256
            dist/StrangeUtaGame-v${{ steps.ver.outputs.version }}-runtime.zip
            dist/StrangeUtaGame-v${{ steps.ver.outputs.version }}-runtime.zip.sha256
            dist/manifest-v${{ steps.ver.outputs.version }}.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}