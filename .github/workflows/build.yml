# StrangeUtaGame 跨平台测试 + 打包流水线
#
# 支持平台: Linux / macOS x86_64 / macOS ARM64 / Windows amd64
#
# 触发方式:
#   - workflow_dispatch:
#       platform = all|Linux|macOS-x86|macOS-ARM|Windows
#       job      = test | build | full
#   - 推送 tag SUGv*  → 全平台 full（测试 + 构建 + Release draft）

name: Build

on:
  push:
    tags:
      - "SUGv*"
  workflow_dispatch:
    inputs:
      platform:
        description: "目标平台"
        default: "all"
        type: choice
        options:
          - all
          - Linux
          - macOS-x86
          - macOS-ARM
          - Windows
      job:
        description: "执行内容"
        default: "test"
        type: choice
        options:
          - test        # 仅单元测试
          - build       # 仅打包（不测试）
          - full        # 测试 + 打包
      ref:
        description: "分支/tag"
        default: "feat/fugashi-only"
        type: string

concurrency:
  group: build-${{ github.ref_name }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Helper: 解析 workflow_dispatch 参数 ──
  _plan:
    runs-on: ubuntu-24.04
    outputs:
      job_mode: ${{ steps.plan.outputs.job_mode }}
      platform: ${{ steps.plan.outputs.platform }}
    steps:
      - id: plan
        run: |
          # tag 推送 = 全平台 full（test + build）
          # manual  = 按输入
          MODE="${{ github.event_name == 'push' && 'full' || inputs.job }}"
          PLAT="${{ github.event_name == 'push' && 'all' || inputs.platform }}"
          echo "job_mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "platform=${PLAT}" >> "$GITHUB_OUTPUT"
          echo "→ platform=${PLAT} job=${MODE}"

  # ──────────────────────────────────────────────
  # 测试（仅 job=test 或 job=full 时运行）
  # ──────────────────────────────────────────────
  test:
    name: Test / ${{ matrix.os }}
    if: needs._plan.outputs.job_mode != 'build'
    needs: _plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: Linux,      runner: ubuntu-24.04 }
          - { os: macOS-x86,  runner: macos-13 }
          - { os: macOS-ARM,  runner: macos-15 }
          - { os: Windows,    runner: windows-2025 }

    steps:
      - name: Skip if platform mismatch
        if: needs._plan.outputs.platform != 'all' && needs._plan.outputs.platform != matrix.os
        run: exit 0

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq portaudio19-dev libsndfile1-dev \
            libportaudio2 libsndfile1 libxcb-cursor0 libegl1 \
            libxkbcommon-x11-0 libglib2.0-0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install numpy
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Verify fugashi
        shell: python
        run: |
          import fugashi
          t = fugashi.Tagger()
          print(f"fugashi OK: {t.parse('日本語')!r}")

      - name: Run unit tests (ruby analyzer)
        run: python -m pytest tests/unit/infrastructure/test_ruby_analyzer.py -v --tb=short -x

      - name: Run other unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=line -x \
            --ignore=tests/unit/infrastructure/test_ruby_analyzer.py \
          || echo "::warning::Some tests failed (non-critical)"

  # ──────────────────────────────────────────────
  # 打包
  # ──────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.os }}
    if: needs._plan.outputs.job_mode != 'test'
    needs: _plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            runner: ubuntu-24.04
            artifact_name: StrangeUtaGame-linux-x86_64
            ext: .tar.gz
            updater_name: Updater

          - os: macOS-x86
            runner: macos-13
            artifact_name: StrangeUtaGame-macos-x86_64
            ext: .zip
            updater_name: Updater

          - os: macOS-ARM
            runner: macos-15
            artifact_name: StrangeUtaGame-macos-arm64
            ext: .zip
            updater_name: Updater

          - os: Windows
            runner: windows-2025
            artifact_name: StrangeUtaGame-windows-amd64
            ext: .zip
            updater_name: Updater.exe

    steps:
      - name: Skip if platform mismatch
        if: needs._plan.outputs.platform != 'all' && needs._plan.outputs.platform != matrix.os
        run: exit 0

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Get version
        id: version
        shell: python
        run: |
          import sys; sys.path.insert(0, 'src')
          from strange_uta_game.__version__ import __version__
          tag = "${{ github.ref_name }}"
          ver = tag[4:] if tag.startswith("SUGv") else tag[1:] if tag.startswith("v") else __version__
          print(f"app_version={ver}")

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq portaudio19-dev libsndfile1-dev \
            libportaudio2 libsndfile1 libxcb-cursor0 libegl1 \
            libxkbcommon-x11-0 libglib2.0-0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install pyinstaller pyinstaller-hooks-contrib numpy
          pip install -r requirements.txt

      # ── 构建 Updater（先于主程序，build.py 会自动复制） ──
      # 缓存 PyInstaller workpath → 跨版本增量编译
      - name: Restore Updater workpath cache
        id: cache-updater-work
        uses: actions/cache@v4
        with:
          path: updater_app/build/
          key: updater-work-${{ runner.os }}-${{ hashFiles('updater_app/main.py', 'updater_app/build_updater.py', 'updater_app/__init__.py', 'src/strange_uta_game/__version__.py') }}
          restore-keys: |
            updater-work-${{ runner.os }}-

      # 缓存二进制产物 → 同版本重跑直接跳过编译
      - name: Restore Updater binary cache
        id: cache-updater-bin
        uses: actions/cache@v4
        with:
          path: updater_app/dist/${{ matrix.updater_name }}
          key: updater-bin-${{ runner.os }}-${{ steps.version.outputs.app_version }}
          restore-keys: |
            updater-bin-${{ runner.os }}-

      - name: Build Updater
        run: python updater_app/build_updater.py --skip-if-exists

      - name: Build Main App
        run: python build.py

      # ── 打包 ──
      - name: Package (Linux / tar.gz)
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar czf ../${{ matrix.artifact_name }}-${{ steps.version.outputs.app_version }}.tar.gz StrangeUtaGame/

      - name: Package (macOS / .app)
        if: runner.os == 'macOS'
        run: |
          cd dist
          if ls *.app 2>/dev/null; then
            zip -r ../${{ matrix.artifact_name }}-${{ steps.version.outputs.app_version }}.zip *.app
          elif [ -d "StrangeUtaGame" ]; then
            zip -r ../${{ matrix.artifact_name }}-${{ steps.version.outputs.app_version }}.zip StrangeUtaGame/
          else
            echo "::error::Nothing found in dist/"; ls -la; exit 1
          fi

      - name: Package (Windows / zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "dist/StrangeUtaGame") {
            Compress-Archive -Path dist/StrangeUtaGame/* `
              -DestinationPath ${{ matrix.artifact_name }}-${{ steps.version.outputs.app_version }}.zip
          } else {
            Write-Error "dist/StrangeUtaGame not found"; Get-ChildItem dist; exit 1
          }

      # ── 打包 Updater（所有平台统一逻辑） ──
      - name: Package Updater
        run: |
          cd updater_app/dist
          if [ -f "${{ matrix.updater_name }}" ]; then
            if [ "${{ matrix.ext }}" = ".tar.gz" ]; then
              tar czf ../${{ matrix.artifact_name }}-updater-${{ steps.version.outputs.app_version }}.tar.gz \
                "${{ matrix.updater_name }}"
            else
              zip ../${{ matrix.artifact_name }}-updater-${{ steps.version.outputs.app_version }}.zip \
                "${{ matrix.updater_name }}"
            fi
          else
            echo "::warning::Updater binary not found at updater_app/dist/${{ matrix.updater_name }}"
          fi
        if: always()

      # ── 上传主程序 + Updater 产物 ──
      - name: Upload main app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ steps.version.outputs.app_version }}
          path: ${{ matrix.artifact_name }}-${{ steps.version.outputs.app_version }}${{ matrix.ext }}
          if-no-files-found: error
          compression-level: 0

      - name: Upload Updater
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-updater-${{ steps.version.outputs.app_version }}
          path: ${{ matrix.artifact_name }}-updater-${{ steps.version.outputs.app_version }}${{ matrix.ext }}
          if-no-files-found: warn
          compression-level: 0

  # ──────────────────────────────────────────────
  # Release（仅 tag 推送时创建）
  # ──────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/SUGv')
    needs: build
    runs-on: ubuntu-24.04
    permissions: { contents: write }

    steps:
      - uses: actions/download-artifact@v4
        with: { merge-multiple: true }

      - name: Generate release notes
        id: notes
        run: |
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "# StrangeUtaGame ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "## Downloads" >> "$GITHUB_OUTPUT"
          for f in *.zip *.tar.gz; do
            [ -f "$f" ] && echo "- \`$f\` ($(du -h "$f" | cut -f1))" >> "$GITHUB_OUTPUT"
          done
          echo "" >> "$GITHUB_OUTPUT"
          echo "_Built by GitHub Actions_" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: List artifacts
        run: ls -lh *.zip *.tar.gz 2>/dev/null || echo "No artifacts"

      - uses: softprops/action-gh-release@v2
        with:
          name: StrangeUtaGame ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          files: "*.zip,*.tar.gz"
          draft: true
          prerelease: false
